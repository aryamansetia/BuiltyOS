services:
  - type: web
    name: builtyos-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        value: https://builtyos-frontend.onrender.com
      - key: GPS_SIMULATION_INTERVAL_MS
        value: 20000

  - type: static
    name: builtyos-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://builtyos-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
